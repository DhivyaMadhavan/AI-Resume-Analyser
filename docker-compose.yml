version: "3.9"

services:

  resume-mongodb:
    image: mongo:8
    container_name: resume-mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

    restart: unless-stopped

  resume-redis:
    image: redis:7
    container_name: resume-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

volumes:
  mongodb_data: